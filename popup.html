<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Descans Visual</title>
  <link rel="stylesheet" href="style.css">
  <script src="p5.min.js"></script>
</head>
<body>
  <div id="app">
    <header class="top">
      <h1>Descans Visual</h1>
    </header>

    <div id="canvas-shell">
      <div id="canvas-container"></div>
    </div>

    <div class="panel">
      <p id="status">Temps de descans: 0 s</p>

      <div id="controls">
        <button id="startBtn">Iniciar</button>
        <button id="resetBtn" class="secondary">Reiniciar</button>
      </div>

      <div id="slider-zone">
        <div class="slider-header">
          <label for="intensitySlider">Intensitat visual</label>
          <span id="sliderValue">3</span>
        </div>
        <input type="range" id="intensitySlider" min="1" max="5" value="3">
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
